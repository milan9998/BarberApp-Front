<section class="premium-page">
  <div class="premium-card form-card">
    <h2 class="premium-title">{{ 'addHaircut.title' | t }}</h2>
    <p class="premium-subtitle">{{ 'addHaircut.subtitle' | t }}</p>

    <form class="premium-form" #haircutForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="premium-field">
        <label class="premium-label" for="haircutType">{{ 'addHaircut.type' | t }}</label>
        <input id="haircutType" name="haircutType" type="text" required class="premium-input" [(ngModel)]="haircutType" />
      </div>

      <div class="premium-field">
        <label class="premium-label" for="price">{{ 'addHaircut.price' | t }}</label>
        <input id="price" name="price" type="number" required class="premium-input" [(ngModel)]="price" />
      </div>

      <div class="premium-field">
        <label class="premium-label" for="duration">{{ 'addHaircut.duration' | t }} (min)</label>
        <input id="duration" name="duration" type="number" required class="premium-input" [(ngModel)]="duration" />
      </div>

      <button type="submit" class="premium-btn premium-btn-primary">{{ 'addHaircut.submit' | t }}</button>
    </form>
  </div>
</section>
