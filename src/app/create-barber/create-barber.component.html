<section class="premium-page">
  <div class="premium-card form-card">
    <h2 class="premium-title">{{ 'createBarber.title' | t }}</h2>
    <p class="premium-subtitle">{{ 'createBarber.subtitle' | t }}</p>

    <form class="premium-form premium-grid-2" #barberForm="ngForm" (ngSubmit)="onSubmit(barberForm)">
      <div class="premium-field">
        <label class="premium-label" for="barberName">{{ 'createBarber.name' | t }}</label>
        <input id="barberName" name="barberName" type="text" required class="premium-input" ngModel />
      </div>

      <div class="premium-field">
        <label class="premium-label" for="phoneNumber">{{ 'createBarber.phone' | t }}</label>
        <input id="phoneNumber" name="phoneNumber" type="text" required class="premium-input" ngModel />
      </div>

      <div class="premium-field">
        <label class="premium-label" for="email">{{ 'createBarber.email' | t }}</label>
        <input id="email" name="email" type="email" required class="premium-input" ngModel />
      </div>

      <div class="premium-field">
        <label class="premium-label" for="password">{{ 'createBarber.password' | t }}</label>
        <input id="password" name="password" type="password" required class="premium-input" ngModel />
      </div>

      <div class="premium-field">
        <label class="premium-label" for="individualStartTime">{{ 'createBarber.start' | t }}</label>
        <input id="individualStartTime" name="individualStartTime" type="time" required class="premium-input" ngModel />
      </div>

      <div class="premium-field">
        <label class="premium-label" for="individualEndTime">{{ 'createBarber.end' | t }}</label>
        <input id="individualEndTime" name="individualEndTime" type="time" required class="premium-input" ngModel />
      </div>

      <div class="submit-row">
        <button type="submit" class="premium-btn premium-btn-primary">{{ 'createBarber.submit' | t }}</button>
      </div>
    </form>
  </div>
</section>
