<section class="premium-page">
  <div class="premium-card auth-card">
    <h2 class="premium-title">{{ 'auth.loginTitle' | t }}</h2>
    <p class="premium-subtitle">{{ 'auth.loginSubtitle' | t }}</p>

    <p class="form-feedback" *ngIf="feedback" [class.error]="feedbackIsError" [class.ok]="!feedbackIsError">
      {{ feedback }}
    </p>

    <form class="premium-form" (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <div class="premium-field">
        <label class="premium-label" for="email">{{ 'auth.email' | t }}</label>
        <input class="premium-input" type="email" id="email" name="email" [(ngModel)]="email" required />
      </div>

      <div class="premium-field">
        <label class="premium-label" for="password">{{ 'auth.password' | t }}</label>
        <input class="premium-input" type="password" id="password" name="password" [(ngModel)]="password" required />
      </div>

      <button class="premium-btn premium-btn-primary" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? ('auth.loginLoading' | t) : ('auth.loginButton' | t) }}
      </button>
    </form>

    <p class="auth-switch">
      {{ 'auth.noAccount' | t }}
      <a routerLink="/register">{{ 'auth.registerButton' | t }}</a>
    </p>
  </div>
</section>
