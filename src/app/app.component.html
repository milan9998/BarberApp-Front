<header class="topbar">
  <a class="brand" routerLink="/home" [attr.aria-label]="'brand.name' | t">
    <img
      class="brand-logo"
      src="/logo-barber-control-hq.png?v=5"
      alt="Barber Control Headquarters"
      width="780"
      height="260"
    />
  </a>

  <nav class="nav-links">
    <a class="nav-button" routerLink="/home">{{ 'nav.home' | t }}</a>
    <a class="nav-button" routerLink="/companies">{{ 'nav.companies' | t }}</a>
    <a class="nav-button" routerLink="/about">{{ 'nav.about' | t }}</a>
    <a class="nav-button" routerLink="/how-it-works">{{ 'nav.how' | t }}</a>
    <a class="nav-button" routerLink="/services">{{ 'nav.services' | t }}</a>
    <a *ngIf="!isLoggedIn" class="nav-button" routerLink="/login">{{ 'nav.login' | t }}</a>
    <a *ngIf="!isLoggedIn" class="nav-button nav-accent" routerLink="/register">{{ 'nav.register' | t }}</a>
    <button *ngIf="isLoggedIn" class="nav-button nav-accent logout-btn" (click)="logout()">{{ 'nav.logout' | t }}</button>
    <button class="lang-switch" type="button" (click)="toggleLanguage()">{{ 'lang.switch' | t }}</button>
  </nav>
</header>

<main class="app-shell">
  <router-outlet></router-outlet>
</main>
