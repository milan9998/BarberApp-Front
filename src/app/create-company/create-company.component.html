<section class="premium-page">
  <div class="premium-card create-company-card">
    <h2 class="premium-title">{{ 'createCompany.title' | t }}</h2>
    <p class="premium-subtitle">{{ 'createCompany.subtitle' | t }}</p>

    <form class="premium-form" (ngSubmit)="onSubmit()" #companyForm="ngForm" enctype="multipart/form-data">
      <div class="premium-field">
        <label class="premium-label" for="companyName">{{ 'createCompany.name' | t }}</label>
        <input class="premium-input" type="text" id="companyName" name="companyName" [(ngModel)]="companyName" required />
      </div>

      <div class="premium-field">
        <span class="premium-label">{{ 'createCompany.images' | t }}</span>
        <div class="drag-drop-area">
          <p class="drag-drop-text">
            <label for="image" class="browse-link">{{ 'createCompany.browse' | t }}</label>
          </p>
          <input type="file" id="image" name="image" multiple accept="image/*" (change)="onFileSelected($event)" style="display: none;">
          <div *ngIf="uploadedFiles.length===0" class="validation-message">
            {{ 'createCompany.validation' | t }}
          </div>
        </div>
      </div>

      <button class="premium-btn premium-btn-primary" type="submit">{{ 'createCompany.submit' | t }}</button>
    </form>

    <div class="uploaded-files-container">
      <div class="uploaded-file-item" *ngFor="let file of uploadedFiles; let i = index">
        <div class="file-info">
          <img *ngIf="file.url" [src]="file.url" alt="Image preview" class="file-preview-thumbnail">
          <div class="file-details">
            <span class="file-name">{{ file.name }}</span>
            <span class="file-size">{{ file.size }}</span>
          </div>
        </div>
        <button type="button" class="btn-remove-file" (click)="removeFile(i)">X</button>
      </div>
    </div>
  </div>
</section>
